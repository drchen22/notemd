allowBuilds:
  msw: true
  sharp: true
  unrs-resolver: true
ignoredBuiltDependencies:
  - sharp
  - unrs-resolver
# Force-upgrade the legacy @radix-ui/*@1.0.x packages that @excalidraw/excalidraw
# pulls in. Those 1.0.x releases predate React 19 and declare peer
# `react: ^16||17||18`, which breaks `next build` during static prerendering of
# /_global-error (React 19 dispatcher incompatibility). The 1.1.x / 2.x lines
# support React 19 and are API-compatible for excalidraw's usage.
overrides:
  "@radix-ui/react-tabs": ^1.1.14
  "@radix-ui/react-presence": ^1.1.6
  "@radix-ui/react-context": ^1.1.4
  "@radix-ui/react-primitive": ^2.1.5
  "@radix-ui/react-roving-focus": ^1.1.12
  "@radix-ui/react-collection": ^1.1.9
  "@radix-ui/react-slot": ^1.2.5
  "@radix-ui/react-compose-refs": ^1.1.3
  "@radix-ui/react-direction": ^1.1.2
  "@radix-ui/react-id": ^1.1.2
  "@radix-ui/react-use-callback-ref": ^1.1.2
  "@radix-ui/react-use-controllable-state": ^1.2.3
  "@radix-ui/react-use-layout-effect": ^1.1.2
